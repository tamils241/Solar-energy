<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to your Stackly Solar Energy account to manage your solar system, monitor production, and track savings.">
  <title>Login - Stackly Solar Energy</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <!-- PAGE LOADER -->
  <div class="page-loader" id="pageLoader">
    <div class="loader-sun"></div>
    <div class="loader-text">Loading...</div>
  </div>

  <!-- HEADER (hidden on auth pages) -->

  <!-- LOGIN -->
  <section class="auth-section">
    <div class="auth-container">
      <div class="auth-form-side">
        <a href="../index.html" class="logo">
          <img src="../images/logo.webp" alt="Stackly Solar Energy" class="logo-img">
          <span class="logo-text"><span>Solar</span> Energy</span>
        </a>
        <h2>Welcome Back</h2>
        <p>Sign in to your account to manage your solar system</p>

        <form class="auth-form" id="loginForm">
          <div class="form-group">
            <label for="loginRole">I am a <span class="required">*</span></label>
            <select id="loginRole" required>
              <option value="">Select your role</option>
              <option value="client">Client</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <div class="form-group">
            <label for="email">Email Address <span class="required">*</span></label>
            <div class="input-icon-wrap">
              <span class="input-icon">&#9993;</span>
              <input type="email" id="email" placeholder="you@example.com" required>
            </div>
          </div>
          <div class="form-group">
            <label for="password">Password <span class="required">*</span></label>
            <div class="input-icon-wrap">
              <span class="input-icon">&#128273;</span>
              <input type="password" id="password" placeholder="Enter your password" pattern="[A-Za-z0-9]{8}" minlength="8" maxlength="8" title="Must be exactly 8 alphanumeric characters (letters and digits only)" required>
            </div>
          </div>
          <div class="form-options">
            <label>
              <input type="checkbox" checked> Remember me
            </label>
            <a href="404.html">Forgot password?</a>
          </div>
          <button type="submit" class="btn btn-green">Sign In</button>
        </form>

        <div class="auth-divider">or continue with</div>

        <p class="auth-alt">
          Don't have an account? <a href="register.html">Create one</a>
        </p>
        <div style="text-align:center; background-color: #04762e; padding: 10px; border-radius: 25px;"><a href="../index.html" style="color: white; text-decoration: none;">Home</a></div>
      </div>
      <div class="auth-image-side">
        <img src="../images/background.webp" alt="Solar panels">
        <h3>Monitor Your Energy</h3>
        <p>Track your solar production, monitor savings, and manage your account from anywhere.</p>
      </div>
    </div>
  </section>

  <script src="../js/script.js"></script>
</body>
</html>
