<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your Stackly Solar Energy account and start your journey toward clean, affordable solar power.">
  <title>Register - Stackly Solar Energy</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <!-- PAGE LOADER -->
  <div class="page-loader" id="pageLoader">
    <div class="loader-sun"></div>
    <div class="loader-text">Loading...</div>
  </div>

  <!-- HEADER (hidden on auth pages) -->

  <!-- REGISTER -->
  <section class="auth-section">
    <div class="auth-container">
      <div class="auth-form-side">
        <a href="../index.html" class="logo">
          <img src="../images/logo.webp" alt="Stackly Solar Energy" class="logo-img">
          <span class="logo-text"><span>Solar</span> Energy</span>
        </a>
        <h2>Create Your Account</h2>
        <p>Join thousands of smart homeowners saving with solar</p>

        <form class="auth-form" id="registerForm">
          <div class="form-group">
            <label for="fullName">Full Name <span class="required">*</span></label>
            <div class="input-icon-wrap">
              <span class="input-icon">&#128100;</span>
              <input type="text" id="fullName" placeholder="John Doe" pattern="[A-Za-z ]{1,16}" maxlength="16" title="Max 16 alphabetic characters" required>
            </div>
          </div>
          <div class="form-group">
            <label for="regEmail">Email Address <span class="required">*</span></label>
            <div class="input-icon-wrap">
              <span class="input-icon">&#9993;</span>
              <input type="email" id="regEmail" placeholder="you@example.com" required>
            </div>
          </div>
          <div class="form-group">
            <label for="phone">Phone Number</label>
            <div class="input-icon-wrap">
              <span class="input-icon">&#128222;</span>
              <input type="tel" id="phone" placeholder="Phone number" pattern="[0-9]{10}" maxlength="10" oninput="this.value=this.value.replace(/\D/g,'')" title="Max 19 digits">
            </div>
          </div>
          <div class="form-group">
            <label for="regPassword">Password <span class="required">*</span></label>
            <div class="input-icon-wrap">
              <span class="input-icon">&#128273;</span>
              <input type="password" id="regPassword" placeholder="Password" pattern="[A-Za-z]{1,8}" maxlength="8" title="Max 8 alphabetic characters only" required>
            </div>
          </div>
          <div class="form-group">
            <label for="confirmPassword">Confirm Password <span class="required">*</span></label>
            <div class="input-icon-wrap">
              <span class="input-icon">&#128273;</span>
              <input type="password" id="confirmPassword" placeholder="Confirm your password" pattern="[A-Za-z]{1,8}" maxlength="8" title="Max 8 alphabetic characters only" required>
            </div>
          </div>
          <div class="form-group">
            <label for="regRole">I am registering as <span class="required">*</span></label>
            <select id="regRole" required>
              <option value="">Select your role</option>
              <option value="client">Client</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          
          <div class="form-checkbox">
            <input type="checkbox" id="terms" required>
            <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
          </div>
          <button type="submit" class="btn btn-green">Create Account</button>
        </form>

        <div class="auth-divider">or sign up with</div>

    

        <p class="auth-alt">
          Already have an account? <a href="login.html">Sign in</a>

        </p>
        <div style="text-align:center; background-color: #04772e; padding: 10px; border-radius: 25px;"><a href="../index.html" style="color: white; text-decoration: none;">Home</a></div>
        
      </div>
      <div class="auth-image-side">
        <img src="../images/background.webp" alt="Solar panel installation">
        <h3>Start Saving Today</h3>
        <p>Create your account and get a free solar assessment. See how much you can save with Stackly Solar.</p>
      </div>
    </div>
  </section>

  <script src="../js/script.js"></script>
</body>
</html>
